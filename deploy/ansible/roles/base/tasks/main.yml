---
- name: Activation des dépôts contrib/non-free/non-free-firmware
  replace:
    path: /etc/apt/sources.list.d/debian.sources
    regexp: '^Components:\s+main$'
    replace: 'Components: main contrib non-free non-free-firmware'

- name: Mise à jour apt
  apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Installation des paquets requis
  apt:
    name:
      - curl
      - git
      - wget
      - htop
      - vim
      - open-iscsi
      - nfs-common
      - wireguard
      - qemu-guest-agent
      - linux-image-amd64
      - linux-headers-amd64
      - firmware-intel-graphics
      - intel-gpu-tools
      - parted
    state: present

- name: Création du système de fichiers sur le disque de données (/dev/sdb)
  filesystem:
    fstype: ext4
    dev: /dev/sdb

- name: Création du dossier /var/lib/rancher
  file:
    path: /var/lib/rancher
    state: directory
    mode: '0755'

- name: Montage du disque de données sur /var/lib/rancher
  mount:
    path: /var/lib/rancher
    src: /dev/sdb
    fstype: ext4
    state: mounted

- name: Suppression du kernel cloud (pas de drivers GPU)
  apt:
    name:
      - linux-image-cloud-amd64
      - linux-image-6.12.73+deb13-cloud-amd64
    state: absent
    purge: true
  ignore_errors: true  # Le package exact peut varier selon la version

- name: Démarrage qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Désactivation du swap
  command: swapoff -a
  changed_when: false

- name: Suppression du swap dans fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Chargement du module virtiofs
  modprobe:
    name: virtiofs
    state: present

- name: Persistance du module virtiofs au boot
  lineinfile:
    path: /etc/modules-load.d/virtiofs.conf
    line: virtiofs
    create: true

- name: Création des points de montage virtiofs
  file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
    owner: '1000'
    group: '1000'
  loop: "{{ virtiofs_mounts }}"

- name: Création des sous-dossiers movies (arr-stack)
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: '1000'
    group: '1000'
  loop:
    - /mnt/shared_data/movies/movies
    - /mnt/shared_data/movies/shows
    - /mnt/shared_data/movies/downloads
    - /mnt/shared_data/movies/joal-import

- name: Configuration des montages virtiofs dans fstab
  lineinfile:
    path: /etc/fstab
    line: "{{ item.tag }}  {{ item.path }}  virtiofs  defaults  0  0"
    regexp: "^{{ item.tag }}\\s"
  loop: "{{ virtiofs_mounts }}"

- name: Montage des virtiofs
  command: mount {{ item.path }}
  loop: "{{ virtiofs_mounts }}"
  ignore_errors: true  # Peut déjà être monté

- name: Configuration du hostname
  hostname:
    name: k3s-control

- name: Chargement des modules kernel requis pour k3s
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay
    - i915

- name: Persistance des modules au boot
  lineinfile:
    path: /etc/modules-load.d/k3s.conf
    line: "{{ item }}"
    create: true
  loop:
    - br_netfilter
    - overlay
    - i915

- name: Paramètres kernel pour k3s
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward", value: "1" }
    - { key: "fs.inotify.max_user_watches", value: "524288" }
    - { key: "fs.inotify.max_user_instances", value: "512" }
