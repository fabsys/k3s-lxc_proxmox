---
# ============================================================
# Rôle Media Center : Kodi (GBM) + RetroArch + Steam + DS4 BT
# Cible : LXC privilégié Ubuntu 24.04, affichage HDMI direct
# ============================================================

- name: Mise à jour apt
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Activer l'architecture i386 (requis pour Steam)
  command: dpkg --add-architecture i386
  args:
    creates: /var/lib/dpkg/arch

- name: Mise à jour apt après ajout i386
  apt:
    update_cache: true

- name: Installation des paquets media (Kodi, RetroArch, Steam, Xorg, GPU AMD)
  apt:
    name:
      # Kodi et support streaming
      - kodi
      - kodi-inputstream-adaptive
      - kodi-inputstream-rtmp
      # Intégration Kodi + libretro (cores natifs Kodi)
      - kodi-game-libretro
      - kodi-game-libretro-bsnes-mercury-accuracy
      - kodi-game-libretro-bsnes-mercury-performance
      # RetroArch + cores Ubuntu 24.04 (plus complet que Debian)
      - retroarch
      - retroarch-assets
      - libretro-mgba            # GBA / GB / GBC
      - libretro-nestopia        # NES
      - libretro-snes9x          # SNES
      - libretro-bsnes-mercury-accuracy
      - libretro-bsnes-mercury-balanced
      - libretro-bsnes-mercury-performance
      - libretro-gambatte        # GB / GBC (autre core)
      - libretro-desmume         # Nintendo DS
      - libretro-genesisplusgx   # Mega Drive / Genesis
      - libretro-beetle-psx      # PlayStation 1
      - libretro-beetle-pce-fast # PC Engine / TurboGrafx
      - libretro-core-info       # Métadonnées des cores
      # SQLite (activation addon Kodi en DB)
      - sqlite3
      # GPU AMD — VA-API + Vulkan pour transcodage + Steam/Proton
      - mesa-va-drivers
      - mesa-vdpau-drivers
      - mesa-vulkan-drivers
      - mesa-vulkan-drivers:i386
      - libva-drm2
      - vainfo
      - libgl1-mesa-dri
      - libgl1-mesa-dri:i386
      # Audio
      - alsa-utils
      - pulseaudio
      # Bluetooth (manette DS4 + télécommande BT)
      - bluetooth
      - bluez
      - bluez-tools
      - python3-dbus
      # Manettes et input
      - joystick
      - evtest
      - libinput-tools
      - kodi-peripheral-joystick
      # Steam (natif Ubuntu)
      - steam-installer
      - steam-libs
      - steam-devices
      # Xorg — serveur X pour Steam Big Picture (cage/Wayland incompatible)
      - xserver-xorg-core
      - xserver-xorg-input-libinput
      - xserver-xorg-video-amdgpu
      - xinit
      - x11-xserver-utils
      # Openbox — WM léger pour forcer Steam en plein écran
      - openbox
      # xdotool — manipulation fenêtres X
      - xdotool
      # D-Bus — requis par Steam runtime launcher service
      - dbus-x11
      # Seat management (requis pour Xorg en LXC sans logind)
      - seatd
      # Libs Proton / compatibilité Steam
      - libvulkan1
      - libvulkan1:i386
      - libc6:i386
      - libstdc++6:i386
      # Utilitaires
      - curl
      - wget
      - unzip
      - xdg-user-dirs
      - locales
    state: present

- name: Création de l'utilisateur kodi
  user:
    name: kodi
    comment: "Kodi Media Center"
    groups: video,audio,input,render,bluetooth,tty
    shell: /bin/bash
    create_home: true

- name: Générer la locale en_US.UTF-8 (requis par Steam / XOpenIM)
  locale_gen:
    name: en_US.UTF-8
    state: present

- name: Créer XDG_RUNTIME_DIR pour l'utilisateur kodi
  file:
    path: /run/user/1000
    state: directory
    owner: kodi
    group: kodi
    mode: '0700'

- name: Créer le dossier PulseAudio runtime
  file:
    path: /run/user/1000/pulse
    state: directory
    owner: kodi
    group: kodi
    mode: '0700'

- name: Droits udev — accès /dev/dri et /dev/input sans sudo
  copy:
    dest: /etc/udev/rules.d/99-kodi.rules
    content: |
      # DRM / GPU AMD
      SUBSYSTEM=="drm", GROUP="video", MODE="0660"
      SUBSYSTEM=="dri", GROUP="render", MODE="0660"
      # Framebuffer
      KERNEL=="fb[0-9]*", GROUP="video", MODE="0660"
      # Input (manettes, IR, claviers)
      SUBSYSTEM=="input", GROUP="input", MODE="0660"
      # uinput (Steam crée des gamepads virtuels pour Proton)
      KERNEL=="uinput", GROUP="input", MODE="0660"

- name: Configuration ALSA — sortie jack par défaut
  copy:
    dest: /etc/asound.conf
    content: |
      defaults.pcm.card 1
      defaults.ctl.card 1

- name: Configuration Kodi — dossier userdata
  file:
    path: /home/kodi/.kodi/userdata
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: Dossier keymaps Kodi
  file:
    path: /home/kodi/.kodi/userdata/keymaps
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: Buttonmap DS4 pour peripheral.joystick Kodi
  copy:
    dest: /usr/share/kodi/addons/peripheral.joystick/resources/buttonmaps/xml/linux/Sony_Computer_Entertainment_Wireless_Controller_13b_8a.xml
    owner: root
    mode: '0644'
    content: |
      <?xml version="1.0" ?>
      <buttonmap>
          <device name="Sony Computer Entertainment Wireless controller" provider="linux" buttoncount="13" axiscount="8">
              <configuration>
                  <appearance id="game.controller.ps.dualanalog" />
                  <axis index="2" center="-1" range="2" />
                  <axis index="5" center="-1" range="2" />
              </configuration>
              <controller id="game.controller.default">
                  <feature name="a" button="0" />
                  <feature name="b" button="1" />
                  <feature name="back" button="8" />
                  <feature name="down" axis="+7" />
                  <feature name="guide" button="10" />
                  <feature name="left" axis="-6" />
                  <feature name="leftbumper" button="4" />
                  <feature name="leftstick">
                      <up axis="-1" />
                      <down axis="+1" />
                      <right axis="+0" />
                      <left axis="-0" />
                  </feature>
                  <feature name="leftthumb" button="11" />
                  <feature name="lefttrigger" axis="+2" />
                  <feature name="right" axis="+6" />
                  <feature name="rightbumper" button="5" />
                  <feature name="rightstick">
                      <up axis="-4" />
                      <down axis="+4" />
                      <right axis="+3" />
                      <left axis="-3" />
                  </feature>
                  <feature name="rightthumb" button="12" />
                  <feature name="righttrigger" axis="+5" />
                  <feature name="start" button="9" />
                  <feature name="up" axis="-7" />
                  <feature name="x" button="3" />
                  <feature name="y" button="2" />
              </controller>
          </device>
      </buttonmap>

- name: Configuration advancedsettings.xml Kodi
  copy:
    dest: /home/kodi/.kodi/userdata/advancedsettings.xml
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      <advancedsettings version="1.0">
        <network>
          <buffermode>1</buffermode>
          <cachemembuffersize>268435456</cachemembuffersize>
        </network>
        <splash>false</splash>
      </advancedsettings>

- name: Configuration guisettings.xml Kodi
  copy:
    dest: /home/kodi/.kodi/userdata/guisettings.xml
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      <settings version="2">
        <setting id="input.peripherals">true</setting>
        <setting id="locale.language">resource.language.fr_fr</setting>
        <setting id="lookandfeel.skin">skin.estuary</setting>
        <setting id="videoplayer.usevaapi">true</setting>
        <setting id="videoplayer.usevaapimpeg4">true</setting>
        <setting id="videoplayer.usevaapihevc">true</setting>
        <setting id="videoplayer.usevaapimpeg2">true</setting>
        <setting id="screensaver.mode">screensaver.xbmc.builtin.black</setting>
        <setting id="screensaver.time">5</setting>
        <setting id="screensaver.disableforaudio">true</setting>
        <setting id="audiooutput.audiodevice">ALSA:plughw:CARD=Generic_1,DEV=0</setting>
      </settings>

- name: Configuration RetroArch — dossier
  file:
    path: /home/kodi/.config/retroarch
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: retroarch.cfg
  copy:
    dest: /home/kodi/.config/retroarch/retroarch.cfg
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      video_driver = "gl"
      video_context_driver = "kms"
      menu_driver = "ozone"
      assets_directory = "/usr/share/libretro/assets"
      video_fullscreen = "true"
      video_windowed_fullscreen = "false"
      video_fullscreen_x = "0"
      video_fullscreen_y = "0"
      input_driver = "udev"
      audio_driver = "alsa"
      audio_device = "plughw:1,0"
      video_vsync = "true"
      libretro_info_path = "/usr/share/libretro/info"
      rgui_browser_directory = "/home/kodi/roms"
      savefile_directory = "/home/kodi/saves"
      savestate_directory = "/home/kodi/savestates"
      input_menu_toggle_gamepad_combo = "3"
      input_quit_gamepad_combo = "4"

- name: Volume ALSA par défaut (jack casque modéré)
  command: "amixer -c 1 set {{ item.control }} {{ item.level }} unmute"
  loop:
    - { control: "Master", level: "50%" }
    - { control: "Headphone", level: "60%" }
  changed_when: false

- name: Dossiers ROMs et saves
  file:
    path: "{{ item }}"
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'
  loop:
    - /home/kodi/roms
    - /home/kodi/roms/snes
    - /home/kodi/roms/nes
    - /home/kodi/roms/megadrive
    - /home/kodi/roms/psx
    - /home/kodi/roms/n64
    - /home/kodi/roms/gba
    - /home/kodi/roms/neogeo
    - /home/kodi/saves
    - /home/kodi/savestates

- name: Symlink /root/roms vers /home/kodi/roms
  file:
    src: /home/kodi/roms
    dest: /root/roms
    state: link

- name: Télécharger le core FBNeo (Neo Geo / Arcade)
  get_url:
    url: https://buildbot.libretro.com/nightly/linux/x86_64/latest/fbneo_libretro.so.zip
    dest: /tmp/fbneo_libretro.so.zip
    mode: '0644'

- name: Installer le core FBNeo
  unarchive:
    src: /tmp/fbneo_libretro.so.zip
    dest: /usr/lib/x86_64-linux-gnu/libretro/
    remote_src: true

- name: Télécharger le core info FBNeo
  get_url:
    url: https://raw.githubusercontent.com/libretro/libretro-core-info/master/fbneo_libretro.info
    dest: /usr/share/libretro/info/fbneo_libretro.info
    mode: '0644'

- name: Dossier cores RetroArch
  file:
    path: /home/kodi/.config/retroarch/cores
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: Copier tous les cores .so dans le dossier RetroArch
  shell: cp /usr/lib/x86_64-linux-gnu/libretro/*.so /home/kodi/.config/retroarch/cores/
  changed_when: true

- name: Copier tous les core info dans le dossier RetroArch
  shell: cp /usr/share/libretro/info/*.info /home/kodi/.config/retroarch/cores/
  changed_when: true

- name: Droits sur le dossier cores
  file:
    path: /home/kodi/.config/retroarch/cores
    state: directory
    owner: kodi
    group: kodi
    recurse: true

- name: Dossier autoconfig manettes RetroArch
  file:
    path: /home/kodi/.config/retroarch/autoconfig
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: Télécharger les profils autoconfig manettes Libretro
  unarchive:
    src: https://github.com/libretro/retroarch-joypad-autoconfig/archive/refs/heads/master.tar.gz
    dest: /tmp/
    remote_src: true

- name: Installer les profils autoconfig Linux/udev
  shell: cp -r /tmp/retroarch-joypad-autoconfig-master/udev/* /home/kodi/.config/retroarch/autoconfig/
  changed_when: true

- name: Droits sur le dossier autoconfig
  file:
    path: /home/kodi/.config/retroarch/autoconfig
    state: directory
    owner: kodi
    group: kodi
    recurse: true

# --- Script de switch Kodi ↔ RetroArch ---

- name: Script de switch Kodi ↔ RetroArch
  copy:
    dest: /usr/local/bin/launch-retroarch
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      rm -f /tmp/.launch-retroarch
      systemctl stop kodi
      sleep 2
      chown root:render /dev/dri/renderD128
      export HOME=/home/kodi
      export LIBVA_DRIVER_NAME=radeonsi
      export XDG_RUNTIME_DIR=/run/user/0
      mkdir -p "$XDG_RUNTIME_DIR"
      dbus-run-session -- /usr/bin/retroarch --menu
      systemctl restart retroarch-switcher.path
      systemctl start kodi

- name: Service systemd — RetroArch switcher
  copy:
    dest: /etc/systemd/system/retroarch-switcher.service
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Switch from Kodi to RetroArch

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/launch-retroarch

- name: Path unit systemd — surveille le trigger RetroArch
  copy:
    dest: /etc/systemd/system/retroarch-switcher.path
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Watch for RetroArch launch request

      [Path]
      PathExists=/tmp/.launch-retroarch

      [Install]
      WantedBy=multi-user.target

- name: Activer le path unit RetroArch switcher
  systemd:
    name: retroarch-switcher.path
    enabled: true
    state: started
    daemon_reload: true

# --- Script de switch Kodi ↔ Steam Big Picture ---

- name: Configuration Openbox — Steam en plein écran sans décoration
  file:
    path: /home/kodi/.config/openbox
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: rc.xml Openbox — fullscreen Steam Big Picture
  copy:
    dest: /home/kodi/.config/openbox/rc.xml
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <openbox_config xmlns="http://openbox.org/3.4/rc">
        <applications>
          <application class="steam" type="normal">
            <maximized>true</maximized>
            <decor>no</decor>
          </application>
          <application class="steamwebhelper" name="Steam Big Picture Mode">
            <maximized>true</maximized>
            <decor>no</decor>
            <fullscreen>yes</fullscreen>
          </application>
        </applications>
        <theme><titleLayout></titleLayout></theme>
        <desktops><number>1</number></desktops>
      </openbox_config>

- name: Script de switch Kodi ↔ Steam
  copy:
    dest: /usr/local/bin/launch-steam
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      rm -f /tmp/.launch-steam
      systemctl stop kodi
      sleep 2
      chown root:render /dev/dri/renderD128
      chmod 660 /dev/uinput
      chgrp input /dev/uinput
      Xorg :0 -sharevts -novtswitch -keeptty -nolisten tcp 2>/dev/null &
      XPID=$!
      sleep 3
      DISPLAY=:0 xhost + >/dev/null 2>&1
      DISPLAY=:0 setxkbmap fr
      # Openbox force le plein écran sur Steam Big Picture
      DISPLAY=:0 openbox --config-file /home/kodi/.config/openbox/rc.xml &
      OBPID=$!
      sleep 1
      su -l kodi -c '
        export DISPLAY=:0
        export XDG_RUNTIME_DIR=/run/user/1000
        export LANG=en_US.UTF-8
        dbus-launch /usr/games/steam -bigpicture -nominidumps -nocrashmonitor -fulldesktopres
      '
      kill $OBPID 2>/dev/null
      kill $XPID 2>/dev/null
      wait $OBPID 2>/dev/null
      wait $XPID 2>/dev/null
      systemctl restart steam-switcher.path
      systemctl start kodi

- name: Service systemd — Steam switcher
  copy:
    dest: /etc/systemd/system/steam-switcher.service
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Switch from Kodi to Steam Big Picture

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/launch-steam

- name: Path unit systemd — surveille le trigger Steam
  copy:
    dest: /etc/systemd/system/steam-switcher.path
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Watch for Steam launch request

      [Path]
      PathExists=/tmp/.launch-steam

      [Install]
      WantedBy=multi-user.target

- name: Activer le path unit Steam switcher
  systemd:
    name: steam-switcher.path
    enabled: true
    state: started
    daemon_reload: true

# --- Addons Kodi ---

- name: Répertoire addon script.launch.retroarch
  file:
    path: /home/kodi/.kodi/addons/script.launch.retroarch
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: addon.xml — RetroArch
  copy:
    dest: /home/kodi/.kodi/addons/script.launch.retroarch/addon.xml
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
      <addon id="script.launch.retroarch" name="RetroArch Launcher" version="1.0.0" provider-name="homelab">
        <requires><import addon="xbmc.python" version="3.0.0"/></requires>
        <extension point="xbmc.python.script" library="default.py"/>
        <extension point="xbmc.addon.metadata">
          <summary lang="en">Launch RetroArch from Kodi</summary>
          <platform>linux</platform>
        </extension>
      </addon>

- name: default.py — addon RetroArch
  copy:
    dest: /home/kodi/.kodi/addons/script.launch.retroarch/default.py
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      import os, xbmc
      open("/tmp/.launch-retroarch", "w").close()
      xbmc.executebuiltin("Quit")

- name: Répertoire addon script.launch.steam
  file:
    path: /home/kodi/.kodi/addons/script.launch.steam
    state: directory
    owner: kodi
    group: kodi
    mode: '0755'

- name: addon.xml — Steam
  copy:
    dest: /home/kodi/.kodi/addons/script.launch.steam/addon.xml
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
      <addon id="script.launch.steam" name="Steam Launcher" version="1.0.0" provider-name="homelab">
        <requires><import addon="xbmc.python" version="3.0.0"/></requires>
        <extension point="xbmc.python.script" library="default.py"/>
        <extension point="xbmc.addon.metadata">
          <summary lang="en">Launch Steam Big Picture from Kodi</summary>
          <platform>linux</platform>
        </extension>
      </addon>

- name: default.py — addon Steam
  copy:
    dest: /home/kodi/.kodi/addons/script.launch.steam/default.py
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      import os, xbmc
      open("/tmp/.launch-steam", "w").close()
      xbmc.executebuiltin("Quit")

- name: favourites.xml — raccourcis RetroArch + Steam dans Kodi
  copy:
    dest: /home/kodi/.kodi/userdata/favourites.xml
    owner: kodi
    group: kodi
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
      <favourites>
        <favourite name="RetroArch">RunScript(script.launch.retroarch)</favourite>
        <favourite name="Steam">RunScript(script.launch.steam)</favourite>
      </favourites>

- name: Configuration Bluetooth
  copy:
    dest: /etc/bluetooth/main.conf
    content: |
      [Policy]
      AutoEnable=true
      [General]
      Name=MediaCenter
      Class=0x000100
      DiscoverableTimeout=0

- name: Service systemd — Kodi en GBM/KMS
  copy:
    dest: /etc/systemd/system/kodi.service
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Kodi Media Center (GBM/KMS)
      After=systemd-udevd.service bluetooth.service sound.target
      Wants=bluetooth.service

      [Service]
      Type=simple
      User=root
      Environment=HOME=/home/kodi
      Environment=LIBVA_DRIVER_NAME=radeonsi
      Environment=MESA_GL_VERSION_OVERRIDE=3.3
      ExecStartPre=/bin/chown root:render /dev/dri/renderD128
      ExecStart=/usr/bin/kodi --standalone --windowing=gbm --audio-backend=pulseaudio
      StandardOutput=journal
      StandardError=journal
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

- name: Activer et démarrer le service Kodi
  systemd:
    name: kodi
    enabled: true
    state: started
    daemon_reload: true

- name: Attendre la création de la DB Addons Kodi
  wait_for:
    path: /home/kodi/.kodi/userdata/Database/Addons33.db
    timeout: 30

- name: Activer les addons launcher dans la DB Kodi
  shell: >
    sqlite3 /home/kodi/.kodi/userdata/Database/Addons33.db
    "UPDATE installed SET enabled=1 WHERE addonID IN ('script.launch.retroarch','script.launch.steam');"
  register: addon_enable
  changed_when: addon_enable.rc == 0
  retries: 3
  delay: 5

- name: Activer le service Bluetooth
  systemd:
    name: bluetooth
    enabled: true
    state: started

- name: "INFO — Appairage manette DS4"
  debug:
    msg: |
      Pour appairer la DS4 en Bluetooth, depuis l'hôte PVE :
        bt-pair pair   (PS+Share ~3s pour mode pairing)
      Pour switcher la sortie audio :
        audio-switch jack | hdmi | status
