argo-cd:
  crds:
    install: true # -- Install and upgrade CRDs
    keep: false # -- Keep CRDs on chart uninstall
  server:
    extraArgs:
      - --insecure
    ingress:
      enabled: true
      ingressClassName: nginx-private
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        external-dns.alpha.kubernetes.io/hostname: "argocd.int.fabsys.ovh"
        external-dns.alpha.kubernetes.io/target: "192.168.1.251"
      hostname: "argocd.int.fabsys.ovh"
      tls: true

  configs:
