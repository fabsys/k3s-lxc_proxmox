# IMPORTANT : remplacer par un SealedSecret avant de commit dans git
# Commande pour créer le SealedSecret :
#

# kubectl create secret generic paperless-secret \
#   --from-literal=PAPERLESS_DBPASS='TON_MOT_DE_PASSE_DB' \
#   --from-literal=PAPERLESS_SECRET_KEY='UNE_LONGUE_CHAINE_ALEATOIRE_50_CHARS' \
#   --from-literal=PAPERLESS_ADMIN_PASSWORD='TON_MOT_DE_PASSE_ADMIN' \
#   -n paperless --dry-run=client -o yaml | kubeseal -o yaml -n paperless > secret.yaml

#
# Pour générer une SECRET_KEY aléatoire :
#   openssl rand -hex 32

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: paperless-secret
  namespace: paperless
spec:
  encryptedData:
    PAPERLESS_ADMIN_PASSWORD: 
    PAPERLESS_DBPASS: 
    PAPERLESS_SECRET_KEY: 
  template:
    metadata:
      name: paperless-secret
      namespace: paperless
