# Service LoadBalancer MetalLB pour exposer le proxy VPN hors cluster
# Permet d'utiliser gluetun comme proxy VPN depuis n'importe quel device du LAN
#
# Clients possibles :
#   - HTTP proxy  : 192.168.1.252:8888 (joal, curl, navigateur...)
#   - Shadowsocks : 192.168.1.252:8388 (ss-local, clients Shadowsocks, applis mobiles...)
#
# Note: MixedProtocolLBService (TCP+UDP sur même service) supporté depuis K8s 1.26+
# Si erreur, créer deux services séparés (un TCP, un UDP)
apiVersion: v1
kind: Service
metadata:
  name: vpn-service-external
  annotations:
    metallb.universe.tf/address-pool: first-pool
    metallb.universe.tf/loadBalancerIPs: 192.168.1.252
spec:
  type: LoadBalancer
  selector:
    app: vpn-gateway
  ports:
    - name: http-proxy
      protocol: TCP
      port: 8888
      targetPort: 8888
    - name: shadowsocks-tcp
      protocol: TCP
      port: 8388
      targetPort: 8388
    - name: shadowsocks-udp
      protocol: UDP
      port: 8388
      targetPort: 8388
