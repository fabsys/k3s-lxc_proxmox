apiVersion: v1
kind: ConfigMap
metadata:
  name: dante-config
  namespace: gluetun
data:
  sockd.conf: |
    logoutput: /dev/stdout

    # Écoute sur toutes les interfaces du pod
    internal: 0.0.0.0 port = 1080

    # Interface externe : tun0 = interface VPN créée par gluetun (OpenVPN)
    # eth0 est bloqué par le kill switch de gluetun pour tout trafic non-VPN
    external: tun0

    # Pas d'authentification
    clientmethod: none
    socksmethod: none

    client pass {
        from: 0.0.0.0/0 to: 0.0.0.0/0
        log: error
    }

    # Autorise TCP + UDP (UDP ASSOCIATE pour les trackers UDP de qBittorrent)
    socks pass {
        from: 0.0.0.0/0 to: 0.0.0.0/0
        command: bind connect udpassociate
        log: error
        protocol: tcp udp
    }
