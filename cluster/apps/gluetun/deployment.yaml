apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpn-gateway
  template:
    metadata:
      labels:
        app: vpn-gateway
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "cyberghost"
            - name: VPN_TYPE
              value: "openvpn"
            - name: SERVER_COUNTRIES
              value: "Netherlands" 
            - name: OPENVPN_PROTOCOL
              value: "udp"
            
            # --- Injection sécurisée des identifiants ---
            # Au lieu de 'value', on utilise 'valueFrom' qui pointe vers le secret
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: vpn-sensitive-data # Le nom du secret (généré par SealedSecret)
                  key: OPENVPN_USER        # La clé dans le secret
            
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vpn-sensitive-data
                  key: OPENVPN_PASSWORD

            # --- Config Proxies ---
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_PORT
              value: "8888"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.0.0.0/8,192.168.0.0/16,172.16.0.0/12"
            # - name: FIREWALL
            #   value: "off"
            # - name: FIREWALL_DEBUG
            #   value: "on"
            # Port 1080 ouvert pour le sidecar SOCKS5 (serjs/go-socks5-proxy)
            - name: FIREWALL_INPUT_PORTS
              value: "8888,1080"


          ports:
            - containerPort: 8888
            - containerPort: 1080

          volumeMounts:
            - name: gluetun-data
              mountPath: /gluetun

            # Injection des certificats depuis le MÊME secret
            - name: vpn-certs
              mountPath: /gluetun/client.key
              subPath: client.key
              readOnly: true
            - name: vpn-certs
              mountPath: /gluetun/client.crt
              subPath: client.crt
              readOnly: true
            - name: vpn-certs
              mountPath: /gluetun/ca.crt
              subPath: ca.crt
              readOnly: true

        # Sidecar SOCKS5 : partage le namespace réseau de gluetun → trafic VPN automatique
        # Nécessaire car gluetun n'a pas de SOCKS5 natif (seulement HTTP proxy et Shadowsocks)
        # SOCKS5 supporte TCP + UDP (contrairement au HTTP proxy) → trackers UDP fonctionnels
        - name: socks5-proxy
          image: serjs/go-socks5-proxy:latest
          ports:
            - containerPort: 1080
          env:
            - name: PROXY_PORT
              value: "1080"
            - name: REQUIRE_AUTH
              value: "false"

      volumes:
        - name: gluetun-data
          emptyDir: {}
        # Définition du volume basé sur le secret
        - name: vpn-certs
          secret:
            secretName: vpn-sensitive-data # Le secret déchiffré par le controller SealedSecret
            items:
              - key: client.key
                path: client.key
              - key: client.crt
                path: client.crt
              - key: ca.crt
                path: ca.crt

