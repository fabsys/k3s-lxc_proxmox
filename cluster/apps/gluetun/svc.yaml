apiVersion: v1
kind: Service
metadata:
  name: vpn-service
spec:
  selector:
    app: vpn-gateway
  ports:
    - name: http-proxy
      protocol: TCP
      port: 8888
      targetPort: 8888
    - name: shadowsocks-tcp
      protocol: TCP
      port: 8388
      targetPort: 8388
    - name: shadowsocks-udp
      protocol: UDP
      port: 8388
      targetPort: 8388
