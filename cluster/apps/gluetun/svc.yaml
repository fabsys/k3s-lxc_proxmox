---
# Service ClusterIP standard : HTTP proxy pour joal et autres apps (TCP uniquement)
apiVersion: v1
kind: Service
metadata:
  name: vpn-service
spec:
  selector:
    app: vpn-gateway
  ports:
    - name: http-proxy
      protocol: TCP
      port: 8888
      targetPort: 8888

---
# Service HEADLESS pour Shadowsocks : bypass kube-proxy, DNS retourne l'IP du pod directement
# Nécessaire pour que ss-local puisse envoyer de l'UDP sans passer par kube-proxy
# (kube-proxy ClusterIP ne route pas fiablement l'UDP en mixed-protocol TCP+UDP)
apiVersion: v1
kind: Service
metadata:
  name: vpn-shadowsocks
spec:
  clusterIP: None
  selector:
    app: vpn-gateway
  ports:
    - name: shadowsocks-tcp
      protocol: TCP
      port: 8388
      targetPort: 8388
    - name: shadowsocks-udp
      protocol: UDP
      port: 8388
      targetPort: 8388
