vm:

  # --- Grafana ---
  grafana:
    enabled: true

    admin:
      existingSecret: grafana-admin-secret
      userKey: admin-user
      passwordKey: admin-password

    persistence:
      enabled: true
      size: 2Gi

    defaultDashboardsTimezone: Europe/Paris

    ingress:
      enabled: true
      ingressClassName: nginx-private
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        external-dns.alpha.kubernetes.io/hostname: "grafana.int.fabsys.ovh"
        external-dns.alpha.kubernetes.io/target: "192.168.1.251"
      hosts:
        - grafana.int.fabsys.ovh
      tls:
        - hosts:
            - grafana.int.fabsys.ovh
          secretName: grafana-tls

  # --- VictoriaMetrics (stockage + requêtes, remplace Prometheus) ---
  vmsingle:
    enabled: true

    spec:
      retentionPeriod: "15d"
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi  # VM compresse mieux que Prometheus, 5Gi suffisent

    ingress:
      enabled: true
      ingressClassName: nginx-private
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        external-dns.alpha.kubernetes.io/hostname: "vm.int.fabsys.ovh"
        external-dns.alpha.kubernetes.io/target: "192.168.1.251"
      hosts:
        - vm.int.fabsys.ovh
      tls:
        - hosts:
            - vm.int.fabsys.ovh
          secretName: vm-tls

  # --- VMAgent (scraping léger, remplace Prometheus scraper) ---
  vmagent:
    enabled: true

  # --- VMAlert (évaluation des règles d'alerte) ---
  vmalert:
    enabled: true

  # --- Alertmanager (notifications Telegram) ---
  alertmanager:
    enabled: true

    spec:
      # Référence la SealedSecret qui contient la config complète (bot Telegram, etc.)
      configSecret: alertmanager-config

      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

    ingress:
      enabled: true
      ingressClassName: nginx-private
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        external-dns.alpha.kubernetes.io/hostname: "alertmanager.int.fabsys.ovh"
        external-dns.alpha.kubernetes.io/target: "192.168.1.251"
      hosts:
        - alertmanager.int.fabsys.ovh
      tls:
        - hosts:
            - alertmanager.int.fabsys.ovh
          secretName: alertmanager-tls

  # --- Compatibilité k3s ---
  # Ces composants sont embarqués dans k3s et non scrapables via les endpoints standards.
  # Les laisser activés génère des alertes "down" permanentes.
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
