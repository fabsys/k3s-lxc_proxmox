# Le secret doit contenir la clé "alertmanager.yaml" avec la config complète.
#
# 1. Crée un fichier alertmanager.yaml avec tes tokens (NE PAS committer ce fichier) :
#
#   global:
#     resolve_timeout: 5m
#   route:
#     group_by: ['alertname', 'namespace']
#     group_wait: 10s
#     group_interval: 5m
#     repeat_interval: 12h
#     receiver: 'telegram'
#   receivers:
#     - name: 'telegram'
#       telegram_configs:
#         - bot_token: 'TON_BOT_TOKEN'
#           chat_id: TON_CHAT_ID
#           parse_mode: HTML
#   inhibit_rules:
#     - source_matchers:
#         - severity="critical"
#       target_matchers:
#         - severity="warning"
#       equal: ['alertname', 'namespace']
#
# 2. Scelle le secret :
#
#   kubectl create secret generic alertmanager-config \
#     --from-file=alertmanager.yaml=./alertmanager.yaml \
#     -n monitoring --dry-run=client -o yaml \
#   | kubeseal --cert sealed-secrets-fixed-key.pem -o yaml \
#   > cluster/apps/system/kube-prometheus-stack/templates/alertmanager-secret.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  encryptedData:
    alertmanager.yaml: REPLACE_WITH_SEALED_DATA
  template:
    metadata:
      name: alertmanager-config
      namespace: monitoring
